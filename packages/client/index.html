<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plex Discord Theater</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #0d0d0d;
        color: #f0f0f0;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }

      html {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
        /* Hints the browser to render native form controls (scrollbars,
           select dropdowns) in a dark palette instead of the default light one. */
        color-scheme: dark;
      }
      html::-webkit-scrollbar, body::-webkit-scrollbar {
        width: 8px;
      }
      html::-webkit-scrollbar-track, body::-webkit-scrollbar-track {
        background: #0d0d0d;
      }
      html::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 4px;
      }
      html::-webkit-scrollbar-thumb:hover, body::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.28);
      }

      /* Themed horizontal scrollbar for hub/shelf rows — replaces the default
         light/white system scrollbar so it blends with the dark UI. */
      .scroll-row {
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.15) transparent;
      }
      .scroll-row::-webkit-scrollbar {
        height: 6px;
      }
      .scroll-row::-webkit-scrollbar-track {
        background: transparent;
      }
      .scroll-row::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 3px;
      }
      .scroll-row::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.28);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
